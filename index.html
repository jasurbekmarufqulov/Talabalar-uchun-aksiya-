<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Talaba Aksiya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        .wheel-outer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ffd700;
            background: #222;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            overflow: hidden;
        }

        .number-sector {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #ffd700;
            transform-origin: 50% 50%;
            padding-top: 15px;
            box-sizing: border-box;
        }

        .line {
            position: absolute;
            width: 2px;
            height: 50%;
            background: rgba(255, 215, 0, 0.3);
            left: 50%;
            top: 0;
            transform-origin: 50% 100%;
        }

        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .spin-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none;
            color: #1e3c72;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .spin-btn:disabled {
            background: #cccccc;
            color: #666666;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .prize-text {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .claim-btn {
            background: linear-gradient(45deg, #2ed573, #26af5f);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Omadli Talaba</h1>
        <div class="subtitle">Rasmiy homiylik aksiyasi</div>

        <div class="wheel-outer">
            <div class="arrow"></div>
            <div id="wheel" class="wheel">
                <div class="line" style="transform: rotate(0deg);"></div>
                <div class="line" style="transform: rotate(45deg);"></div>
                <div class="line" style="transform: rotate(90deg);"></div>
                <div class="line" style="transform: rotate(135deg);"></div>
                <div class="line" style="transform: rotate(180deg);"></div>
                <div class="line" style="transform: rotate(225deg);"></div>
                <div class="line" style="transform: rotate(270deg);"></div>
                <div class="line" style="transform: rotate(315deg);"></div>

                <div class="number-sector" style="transform: rotate(22.5deg);">1,000 so'm</div>
                <div class="number-sector" style="transform: rotate(67.5deg);">3,000 so'm</div>
                <div class="number-sector" style="transform: rotate(112.5deg);">5,000 so'm</div>
                <div class="number-sector" style="transform: rotate(157.5deg);">2,000 so'm</div>
                <div class="number-sector" style="transform: rotate(202.5deg);">10,000 so'm</div>
                <div class="number-sector" style="transform: rotate(247.5deg);">4,000 so'm</div>
                <div class="number-sector" style="transform: rotate(292.5deg);">6,000 so'm</div>
                <div class="number-sector" style="transform: rotate(337.5deg);">8,000 so'm</div>
            </div>
        </div>

        <button id="spinBtn" class="spin-btn" onclick="startSpin()">Aylantirish</button>

        <div id="resultBox" class="result-box">
            <div id="prizeText" class="prize-text"></div>
            <button class="claim-btn" id="claimBtn" onclick="sendResultToBot()">Yutuqni hisobga olish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let hasSpun = false;
        let selectedPrize = "";
        let finalBalance = 0;

        // Botingizning yangi tokeni va shaxsiy ID'ingiz to'g'ridan-to'g'ri brauzerga ulandi
        const BOT_TOKEN = '8947184537:AAHJr2rVEQ_lfvSY8Ixh5dzUNkOTvRvaO5E';
        const ADMIN_ID = '2002084215';

        const prizes = ["1,000", "3,000", "5,000", "2,000", "10,000", "4,000", "6,000", "8,000"];

        function startSpin() {
            if (hasSpun) return;
            hasSpun = true;
            document.getElementById('spinBtn').disabled = true;

            const wheel = document.getElementById('wheel');
            const randomDegree = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            const actualDegrees = randomDegree % 360;
            const sectorIndex = Math.floor((360 - actualDegrees) / 45) % 8;
            
            selectedPrize = prizes[sectorIndex];
            finalBalance = parseInt(selectedPrize.replace(/,/g, '')) + 10000; 

            setTimeout(() => {
                document.getElementById('prizeText').innerText = `🎉 Tabriklaymiz! Sizga ${selectedPrize} so'm aksiya bonusi ajratildi!`;
                document.getElementById('resultBox').style.display = 'block';
            }, 4000);
        }

        function sendResultToBot() {
            document.getElementById('claimBtn').disabled = true;
            document.getElementById('claimBtn').innerText = "Yuborilmoqda...";

            // Telegram WebApp foydalanuvchisi ma'lumotlari
            const user = tg.initDataUnsafe?.user || {};
            const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || "Noma'lum Ishtirokchi";
            const username = user.username ? `@${user.username}` : "yo'q";
            const userId = user.id || "Aniqlanmadi";

            // Telegram API orqali to'g'ridan-to'g'ri ADMINGA (Sizga) xabar urish matni
            const text = `📈 **YANGI AKSIYA ISHTIROKCHISI (KAFOLATLANGAN)**\n\n` +
                         `👤 Foydalanuvchi: ${fullName} (${username})\n` +
                         `🆔 Telegram ID: \`${userId}\`\n` +
                         `📋 Ishtirok turi: Rasmiy Aksiya\n` +
                         `💰 Berilgan bonus: ${selectedPrize} so'm\n` +
                         `💳 Jami balansi: ${finalBalance.toLocaleString('uz-UZ')} so'm`;

            // Brauzerdan to'g'ridan-to'g'ri Telegram serveriga Fetch so'rovi
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: text,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                // Hammasi muvaffaqiyatli bo'lsa, o'yin oynasini yopamiz
                tg.close();
            })
            .catch((error) => {
                console.error("Xatolik:", error);
                tg.close();
            });
        }
    </script>
</body>
</html>
