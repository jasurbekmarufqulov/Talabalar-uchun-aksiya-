<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Baraban</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #161625;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .balance-box {
            font-size: 24px;
            font-weight: bold;
            color: #00ffc6;
            margin-bottom: 20px;
            border: 2px dashed #00ffc6;
            padding: 10px;
            border-radius: 10px;
        }
        .wheel-placeholder {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid #ff007f;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: radial-gradient(circle, #ff007f, #7928ca);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-spin {
            background: linear-gradient(to right, #ff007f, #7928ca);
            color: white;
        }
        .btn-ref {
            background-color: #28a745;
            color: white;
        }
        .btn-withdraw {
            background-color: #007bff;
            color: white;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎡 Omadli Baraban</h2>
    
    <div class="balance-box">
        Balans: <span id="balans_matni">0 so'm</span>
    </div>

    <div class="wheel-placeholder" id="baraban_gildiragi">
        🎯 OMAD
    </div>

    <button class="btn-spin" onclick="barabanniAylantir()">🎡 Barabanni Aylantirish</button>
    <button class="btn-ref" onclick="do'stniTaklifQilish()">👥 Do'stni taklif qilish (+500 so'm)</button>

    <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
        <h3>💰 Pul yechish (Karta)</h3>
        <input type="number" id="cardInput" placeholder="8600 0000 0000 0000">
        <button class="btn-withdraw" onclick="sendWithdrawRequest()">📩 Arizani Adminga Yuborish</button>
    </div>
</div>

<script>
    // Telegram WebApp obyektini ishga tushirish
    const tg = window.Telegram.WebApp;
    tg.expand(); // Oynani to'liq ekranga ochish

    // Server havolasi (Render.com ga yuklaganingizdan keyingi havola)
    const SERVER_URL = "https://sizning-loyiha-nomingiz.onrender.com";

    let joriyBalans = 0;
    let oxirgiAylantirilganVaqt = localStorage.getItem("lastSpinTime") || null;
    let userId = tg.initDataUnsafe?.user?.id || 1234567; // Test uchun default ID
    let username = tg.initDataUnsafe?.user?.first_name || "Ismsiz";

    // O'yin boshlanganda serverdan foydalanuvchi balansini tekshirib olish
    fetch(`${SERVER_URL}/get-user?id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if(data) {
                joriyBalans = data.balance;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        }).catch(err => console.log("Server ulanishda xato, lekin o'yin ishlayveradi."));

    // 1. BARABANNI AYLANTIRISH MANTIQLARI
    function barabanniAylantir() {
        let bugun = new Date().toDateString(); // Masalan: "Mon Jun 15 2026"

        if (oxirgiAylantirilganVaqt !== bugun) {
            // Kunlik tekin imkoniyat bor!
            omadniSinash("tekin", bugun);
        } else {
            // Tekin imkoniyat tugagan -> Premium taklif qilish
            let rozimi = confirm("Bugungi tekin imkoniyatingiz tugadi. Hisobingizdan 5000 so'm evaziga Premium aylantirishni xohlaysizmi?");
            if (rozimi) {
                if (joriyBalans >= 5000) {
                    omadniSinash("premium", bugun);
                } else {
                    alert("Hisobingizda mablag' yetarli emas! Premium uchun kamida 5000 so'm bo'lishi kerak.");
                }
            }
        }
    }

    // Barabanni aylantirish va yutuq yozish
    function omadniSinash(tur, bugun) {
        let gildirak = document.getElementById("baraban_gildiragi");
        let randomDeg = Math.floor(Math.random() * 360) + 1440; // Kamida 4 marta aylanish effekt
        gildirak.style.transform = `rotate(${randomDeg}deg)`;

        // Baraban 3 soniya aylanadi, keyin yutuq hisoblanadi
        setTimeout(() => {
            let yutuqlar = [0, 500, 1000, 2000, 5000, 10000];
            let tasodifiyYutuq = yutuqlar[Math.floor(Math.random() * yutuqlar.length)];
            
            if (tur === "tekin") {
                joriyBalans += tasodifiyYutuq;
                oxirgiAylantirilganVaqt = bugun;
                localStorage.setItem("lastSpinTime", bugun);
                alert(`🎉 Tabriklaymiz! Tekin aylantirishdan ${tasodifiyYutuq} so'm yutdingiz!`);
            } else if (tur === "premium") {
                joriyBalans = (joriyBalans - 5000) + tasodifiyYutuq;
                alert(`🔥 Premium aylantirish! 5000 so'm yechildi va siz ${tasodifiyYutuq} so'm yutdingiz!`);
            }

            document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            
            // Serverdagi bazaga yangi balansni yuborish
            balansniServerdaYangila(joriyBalans);
        }, 3000);
    }

    function balansniServerdaYangila(yangiBalans) {
        fetch(`${SERVER_URL}/update-balance`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, balance: yangiBalans })
        });
    }

    // 2. REFERAL TIZIMI (DO'ST TAKLIF QILISH JS)
    function do'stniTaklifQilish() {
        let botUsername = "SizningBarabanBot"; // O'zingizning botingiz usernamesini yozing
        let text = "Do'stim, kuniga 1 marta tekin baraban aylantirib pul yutib ol! 🎁";
        let link = `https://t.me/${botUsername}?start=r_${userId}`;
        
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
    }

    // 3. KARTA RAQAMINI ADMINGA YUBORISH
    function sendWithdrawRequest() {
        let cardNum = document.getElementById("cardInput").value;

        if (cardNum.length < 16) {
            alert("Karta raqami xato! Kamida 16 ta raqam kiritishingiz shart.");
            return;
        }

        fetch(`${SERVER_URL}/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, card: cardNum, summa: joriyBalans })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Arizangiz adminga muvaffaqiyatli yuborildi! Tez orada pul o'tkaziladi.");
            } else {
                alert("Xatolik yuz berdi. Balansingizni tekshiring.");
            }
        });
    }
</script>
</body>
</html>
