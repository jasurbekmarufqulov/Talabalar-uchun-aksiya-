<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Talaba Aksiya</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        /* Ruletka g'ildiragi dizayni */
        .wheel-outer {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 30px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ffd700;
            background: conic-gradient(
                #ff4757 0deg 45deg, #2ed573 45deg 90deg,
                #1e90ff 90deg 135deg, #ffa500 135deg 180deg,
                #9b59b6 180deg 225deg, #1abc9c 225deg 270deg,
                #f1c40f 270deg 315deg, #e74c3c 315deg 360deg
            );
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        /* Ruletka ko'rsatkichi (Arrow) */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ffd700;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .spin-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none;
            color: #1e3c72;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
        }

        .spin-btn:disabled {
            background: #cccccc;
            color: #666666;
            box-shadow: none;
            cursor: not-allowed;
        }

        .spin-btn:not(:disabled):active {
            transform: scale(0.97);
        }

        /* Natija ekrani */
        .result-box {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .prize-text {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .claim-btn {
            background: linear-gradient(45deg, #2ed573, #26af5f);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Omadli Talaba</h1>
        <div class="subtitle">Rasmiy homiylik aksiyasi</div>

        <div class="wheel-outer">
            <div class="arrow"></div>
            <div id="wheel" class="wheel"></div>
        </div>

        <button id="spinBtn" class="spin-btn" onclick="startSpin()">Aylantirish</button>

        <div id="resultBox" class="result-box">
            <div id="prizeText" class="prize-text"></div>
            <button class="claim-btn" onclick="sendResultToBot()">Yutuqni hisobga olish</button>
        </div>
    </div>

    <script>
        // Telegram WebApp yuklanishi
        const tg = window.Telegram.WebApp;
        tg.expand();

        let hasSpun = false;
        let selectedPrize = "";
        let finalBalance = 0;

        // YUTUQLAR SIZ SO'RAGANDEK 1000 SO'MDAN 10000 SO'MGACNA MOSLANDI
        const prizes = ["1,000", "3,000", "5,000", "2,000", "10,000", "4,000", "6,000", "8,000"];

        function startSpin() {
            if (hasSpun) return;
            hasSpun = true;
            
            document.getElementById('spinBtn').disabled = true;

            const wheel = document.getElementById('wheel');
            const randomDegree = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            const actualDegrees = randomDegree % 360;
            const sectorIndex = Math.floor((360 - actualDegrees) / 45) % 8;
            
            selectedPrize = prizes[sectorIndex];
            
            // Foydalanuvchining umumiy balansi (Yutuq + asosiy bonus hisobi)
            finalBalance = parseInt(selectedPrize.replace(/,/g, '')) + 10000; 

            setTimeout(() => {
                document.getElementById('prizeText').innerText = `🎉 Tabriklaymiz! Sizga ${selectedPrize} so'm aksiya bonusi ajratildi!`;
                document.getElementById('resultBox').style.display = 'block';
            }, 4000);
        }

        function sendResultToBot() {
            const dataString = `${selectedPrize} so'm|Rasmiy Aksiya|${finalBalance.toLocaleString('uz-UZ')}`;
            tg.sendData(dataString);
            tg.close();
        }
    </script>
</body>
</html>
