<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pullik Omadli Baraban</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f0c1b;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #1d1932;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        .balance-box {
            font-size: 26px;
            font-weight: bold;
            color: #00ffaa;
            margin-bottom: 20px;
            border: 2px dashed #00ffaa;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 255, 170, 0.05);
        }
        .wheel-placeholder {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 8px solid #ffcc00;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            background: radial-gradient(circle, #ff3366, #110022);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.3, 1);
            box-shadow: 0 0 20px #ff3366;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-spin-regular {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
        }
        .btn-spin-premium {
            background: linear-gradient(to right, #f12711, #f5af19);
            color: white;
        }
        .btn-ref {
            background-color: #28a745;
            color: white;
        }
        .btn-withdraw {
            background-color: #e4a11b;
            color: black;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #3d356b;
            background-color: #110d26;
            color: white;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 Pullik Baraban V2</h2>
    
    <div class="balance-box">
        Hisobingiz: <span id="balans_matni">0 so'm</span>
    </div>

    <div class="wheel-placeholder" id="baraban_gildiragi">
        💰 SPIN
    </div>

    <button class="btn-spin-regular" onclick="barabanniAylantir('regular')">⚡️ Oddiy Aylantirish (-500 so'm)</button>
    <button class="btn-spin-premium" onclick="barabanniAylantir('premium')">👑 Premium Aylantirish (-5000 so'm)</button>
    
    <button class="btn-ref" onclick="do'stniTaklifQilish()">👥 Do'stni chaqirish (+500 so'm)</button>

    <div style="margin-top: 25px; border-top: 2px solid #2d264f; padding-top: 15px;">
        <h3>💳 Pulni yechib olish</h3>
        <input type="number" id="cardInput" placeholder="8600 0000 0000 0000">
        <button class="btn-withdraw" onclick="sendWithdrawRequest()">📩 Yechib olish arizasini yuborish</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SERVER_URL = "https://sizning-loyiha-nomingiz.onrender.com"; // O'zingizning Render havolangiz

    let joriyBalans = 0;
    let userId = tg.initDataUnsafe?.user?.id || 7777777; 
    let username = tg.initDataUnsafe?.user?.first_name || "O'yinchi";

    // Sahifa ochilganda bazadagi haqiqiy balansni tekshirish
    fetch(`${SERVER_URL}/get-user?id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if(data) {
                joriyBalans = data.balance;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        });

    // PULLIK AYLANTIRISH MANTIQI
    function barabanniAylantir(rejim) {
        if (rejim === 'regular') {
            if (joriyBalans >= 500) {
                joriyBalans -= 500; // Balansdan srazu 500 so'm yechish
                omadniSinash('regular');
            } else {
                alert("Hisobingizda mablag' yetarli emas! Kamida 500 so'm kerak. Do'stlarni taklif qilib pul ishlang.");
            }
        } 
        else if (rejim === 'premium') {
            if (joriyBalans >= 5000) {
                joriyBalans -= 5000; // Balansdan srazu 5000 so'm yechish
                omadniSinash('premium');
            } else {
                alert("Premium rejim uchun hisobingizda kamida 5000 so'm bo'lishi kerak!");
            }
        }
        document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
    }

    // Barabanning aylanish vizual effekti va yutuqlar algoritmi
    function omadniSinash(rejim) {
        let gildirak = document.getElementById("baraban_gildiragi");
        let randomDeg = Math.floor(Math.random() * 360) + 1800; // 5 marta to'liq aylanish
        gildirak.style.transform = `rotate(${randomDeg}deg)`;

        setTimeout(() => {
            let yutuq = 0;

            if (rejim === 'regular') {
                // 500 so'mlik rejim yutuqlari (Omadga qarab foyda yoki zarar)
                let yutuqlarXonasi = [0, 100, 300, 500, 1000, 1500, 2500];
                yutuq = yutuqlarXonasi[Math.floor(Math.random() * yutuqlarXonasi.length)];
                alert(`🎰 Oddiy baraban! Sizga ${yutuq} so'm yutuq chiqdi!`);
            } 
            else if (rejim === 'premium') {
                // 5000 so'mlik rejim yutuqlari (Katta pullar)
                let premiumYutuqlar = [0, 1000, 3000, 5000, 7000, 15000, 30000];
                yutuq = premiumYutuqlar[Math.floor(Math.random() * premiumYutuqlar.length)];
                alert(`👑 Premium baraban! Sizga ${yutuq} so'm katta yutuq chiqdi!`);
            }

            joriyBalans += yutuq; // Yutuqni balansga qo'shish
            document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            
            // Serverda ham balansni srazu xavfsiz yangilash
            balansniServerdaYangila(joriyBalans);
        }, 3000);
    }

    function balansniServerdaYangila(yangiBalans) {
        fetch(`${SERVER_URL}/update-balance`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, balance: yangiBalans })
        });
    }

    // REFERAL LINKI GENERATSIYASI
    function do'stniTaklifQilish() {
        let botUsername = "SizningBarabanBot"; 
        let text = "Do'stim, pullik barabanni aylantirib omadingni sina, haqiqiy pul yut! 🎁";
        let link = `https://t.me/${botUsername}?start=r_${userId}`;
        
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
    }

    // ADMINGA KARTA RAQAMINI YUBORISH
    function sendWithdrawRequest() {
        let cardNum = document.getElementById("cardInput").value;

        if (cardNum.length < 16) {
            alert("Karta raqami noto'g'ri! 16 ta raqam bo'lishi lozim.");
            return;
        }
        if (joriyBalans <= 0) {
            alert("Yechish uchun balansingizda pul yo'q!");
            return;
        }

        fetch(`${SERVER_URL}/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, card: cardNum, summa: joriyBalans })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Arizangiz adminga jo'natildi! Hisobingiz arizadagi summaga yangilandi.");
                joriyBalans = 0;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            } else {
                alert("Xatolik: Ariza rad etildi.");
            }
        });
    }
</script>
</body>
</html>
