<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Talaba Barabani</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2b589f; /* Rasmdagi ko'k fon */
            color: white;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h2 {
            font-size: 26px;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .balance-box {
            font-size: 22px;
            font-weight: bold;
            color: #00ffaa;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 150px;
        }

        /* 🎡 BARABAN JOYI STRUKTURASI */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        /* Rasmdagi qizil uchburchak ko'rsatkich (Strelka) */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 24px solid #ff4444; /* Qizil rang */
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* TUGMALAR */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-spin-regular { background: linear-gradient(to right, #00c6ff, #0072ff); color: white; }
        .btn-spin-premium { background: linear-gradient(to right, #f12711, #f5af19); color: white; }
        .btn-ref { background-color: #28a745; color: white; }
        .btn-withdraw { background-color: #ffcc00; color: black; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background-color: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>OMADLI TALABA</h2>
    <div class="subtitle">Rasmiy homiylik aksiyasi</div>
    
    <div class="balance-box">
        <span id="balans_matni">0 so'm</span>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <button class="btn-spin-regular" onclick="barabanniAylantir('regular')">⚡️ Oddiy Aylantirish (-500 so'm)</button>
    <button class="btn-spin-premium" onclick="barabanniAylantir('premium')">👑 Premium Aylantirish (-5000 so'm)</button>
    <button class="btn-ref" onclick="do'stniTaklifQilish()">👥 Do'stni chaqirish (+500 so'm)</button>

    <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
        <h3>💳 Pulni yechib olish</h3>
        <input type="number" id="cardInput" placeholder="8600 0000 0000 0000">
        <button class="btn-withdraw" onclick="sendWithdrawRequest()">📩 Yechib olish arizasini yuborish</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SERVER_URL = "https://sizning-loyiha-nomingiz.onrender.com"; // O'zingizning Render havolangiz

    let joriyBalans = 0;
    let userId = tg.initDataUnsafe?.user?.id || 7777777; 
    let username = tg.initDataUnsafe?.user?.first_name || "O'yinchi";
    let isSpinning = false; 

    // Rasmdagi 8 ta aniq yutuqlar ketma-ketligi
    const yutuqlar = ["3,000 so'm", "1,000 so'm", "8,000 so'm", "6,000 so'm", "4,000 so'm", "10,000 so'm", "2,000 so'm", "5,000 so'm"];
    
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const numSectors = yutuqlar.length;
    const arcSize = (2 * Math.PI) / numSectors;

    let currentRotation = 0;

    // 🎨 CANVAS ORQALI BARABANNI RASMDAGIDEK CHIZISH
    function drawWheel() {
        ctx.clearRect(0, 0, 300, 300);
        
        // Baraban markazi va radiusi
        const cx = 150;
        const cy = 150;
        const r = 140;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(currentRotation);

        for (let i = 0; i < numSectors; i++) {
            const angle = i * arcSize;
            
            // Sektor fonini to'q kulrang/qora chizish (Rasmdagidek)
            ctx.fillStyle = "#262626"; 
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, r, angle, angle + arcSize);
            ctx.closePath();
            ctx.fill();

            // Sariq chiziqli chegaralar (Chekka va ichki chiziqlar)
            ctx.strokeStyle = "#eec915"; 
            ctx.lineWidth = 2;
            ctx.stroke();

            // Sektor ichidagi matnni (pulni) yozish
            ctx.save();
            ctx.fillStyle = "#eec915"; // Sariq rangli yozuv
            ctx.font = "bold 13px Arial";
            ctx.textBaseline = "middle";
            ctx.textAlign = "right";
            
            // Matn burchagini o'rtaga to'g'rilash va burish
            ctx.rotate(angle + arcSize / 2);
            ctx.fillText(yutuqlar[i], r - 15, 0);
            ctx.restore();
        }

        // Tashqi qalin sariq aylana cheti
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, 2 * Math.PI);
        ctx.lineWidth = 6;
        ctx.strokeStyle = "#eec915";
        ctx.stroke();

        // Markazdagi kichik sariq nuqta
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, 2 * Math.PI);
        ctx.fillStyle = "#eec915";
        ctx.fill();

        ctx.restore();
    }

    // Birinchi marta yuklanganda barabanni ekranga chizish
    drawWheel();

    // Serverdan balansni yuklash
    fetch(`${SERVER_URL}/get-user?id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if(data) {
                joriyBalans = data.balance;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        }).catch(e => console.log("Server ulanish xatosi"));

    function barabanniAylantir(rejim) {
        if(isSpinning) return; 

        if (rejim === 'regular') {
            if (joriyBalans >= 500) {
                joriyBalans -= 500;
                omadniSinash('regular');
            } else {
                alert("Mablag' yetarli emas! Do'stlarni chaqirib pul ishlang.");
            }
        } 
        else if (rejim === 'premium') {
            if (joriyBalans >= 5000) {
                joriyBalans -= 5000;
                omadniSinash('premium');
            } else {
                alert("Premium rejim uchun hisobingizda kamida 5000 so'm bo'lishi kerak!");
            }
        }
        document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
    }

    // SPIN ANIMATSIYASI
    function omadniSinash(rejim) {
        isSpinning = true;
        
        // Tasodifiy qaysidir sektorni tanlash (0 dan 7 gacha index)
        const targetSectorIndex = Math.floor(Math.random() * numSectors);
        
        // Kamida 5 marta to'liq aylanish va maqsadli burchakka kelish
        const extraRotations = 5 * 2 * Math.PI;
        
        // Strelka tepada (ya'ni -90 darajada) turgani uchun burchakni moslash
        const targetAngle = (3 * Math.PI / 2) - (targetSectorIndex * arcSize) - (arcSize / 2);
        const finalRotation = extraRotations + targetAngle;

        let startTimestamp = null;
        const duration = 4000; // 4 soniya aylanish animatsiyasi

        function animate(timestamp) {
            if (!startTimestamp) startTimestamp = timestamp;
            const elapsed = timestamp - startTimestamp;
            const progress = Math.min(elapsed / duration, 1);
            
            // Aylanishni sekinlashuvchi (ease-out) qilish algoritmi
            const easeOut = 1 - Math.pow(1 - progress, 3);
            currentRotation = easeOut * finalRotation;
            
            drawWheel(); // Har bir kadrda qayta chizish

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // To'xtagandan keyin yutuqni aniqlash
                const yutuqMatni = yutuqlar[targetSectorIndex];
                const yutuqSumma = parseInt(yutuqMatni.replace(/[^0-9]/g, '')); // Raqamga o'tkazish

                alert(`🎰 Omadli Talaba! Sizga ${yutuqMatni} yutuq chiqdi!`);

                joriyBalans += yutuqSumma; 
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
                
                balansniServerdaYangila(joriyBalans);
                isSpinning = false;
            }
        }
        requestAnimationFrame(animate);
    }

    function balansniServerdaYangila(yangiBalans) {
        fetch(`${SERVER_URL}/update-balance`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, balance: yangiBalans })
        });
    }

    function do'stniTaklifQilish() {
        let botUsername = "SizningBarabanBot"; 
        let text = "Do'stim, rasmiy aksiyada qatnashib naqd pullar yutib ol! 🎁";
        let link = `https://t.me/${botUsername}?start=r_${userId}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
    }

    function sendWithdrawRequest() {
        let cardNum = document.getElementById("cardInput").value;
        if (cardNum.length < 16) { alert("Karta raqami xato!"); return; }
        if (joriyBalans <= 0) { alert("Balansda pul yo'q!"); return; }

        fetch(`${SERVER_URL}/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, card: cardNum, summa: joriyBalans })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Arizangiz muvaffaqiyatli adminga jo'natildi!");
                joriyBalans = 0;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        });
    }
</script>
</body>
</html>
