<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Student — Pulli Roulette</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            color: #f1c40f;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #2ecc71;
        }

        .roulette-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 35px rgba(0,0,0,0.6), 0 0 0 12px rgba(241, 196, 15, 0.2);
            transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.35, 1.02);
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }
        .center-circle::after {
            content: '💰';
            font-size: 22px;
        }

        .buttons-area {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .spin-btn {
            background: #2ecc71;
            color: white;
        }
        .spin-btn:hover { background: #27ae60; }
        .spin-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.98);
            color: #2c3e50;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            z-index: 100;
            width: 85%;
            max-width: 300px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-popup.active {
            transform: translate(-50%, -50%) scale(1);
        }
        .result-popup h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2ecc71;
        }
        .result-popup p {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .close-popup-btn {
            background: #2c3e50;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Omadli Student</h1>
    <div class="subtitle">Har kuni real pullik yutuqlar yutib ol!</div>
    
    <div class="balance-card">Balans: <span id="userBalance">0</span> so'm</div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="center-circle"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <div class="buttons-area">
        <button class="spin-btn" id="spinBtn" onclick="handleSpin()">G'ildirakni aylantirish (Tekin)</button>
    </div>

    <div class="result-popup" id="resultPopup">
        <h2>YUTUQ!</h2>
        <p id="prizeText">Siz yutdingiz: </p>
        <button class="close-popup-btn" onclick="closePopup()">Hisobga olish</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultPopup = document.getElementById('resultPopup');
        const prizeText = document.getElementById('prizeText');
        const userBalanceTxt = document.getElementById('userBalance');

        let currentBalance = 0;
        let isFreeAttempt = true; 

        const prizes = [
            { text: "500 So'm", amount: 500, color: "#1abc9c" },
            { text: "1 000 So'm", amount: 1000, color: "#2c3e50" },
            { text: "2 000 So'm", amount: 2000, color: "#2980b9" },
            { text: "3 000 So'm", amount: 3000, color: "#27ae60" },
            { text: "4 000 So'm", amount: 4000, color: "#f39c12" },
            { text: "5 000 So'm", amount: 5000, color: "#8e44ad" },
            { text: "7 000 So'm", amount: 7000, color: "#c0392b" }, 
            { text: "8 000 So'm", amount: 8000, color: "#16a085" }, 
            { text: "9 000 So'm", amount: 9000, color: "#7f8c8d" }, 
            { text: "10 000 So'm", amount: 10000, color: "#d35400" }
        ];

        const numSegments = prizes.length;
        const segmentAngle = (2 * Math.PI) / numSegments;
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numSegments; i++) {
                const angle = i * segmentAngle;
                ctx.beginPath();
                ctx.fillStyle = prizes[i].color;
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, angle, angle + segmentAngle);
                ctx.lineTo(150, 150);
                ctx.fill();
                
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(angle + segmentAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 12px sans-serif"; 
                ctx.textAlign = "right";
                ctx.fillText(prizes[i].text, 135, 4);
                ctx.restore();
            }
        }

        function handleSpin() {
            if (isSpinning) return;

            if (isFreeAttempt) {
                isFreeAttempt = false; 
                spinWheel(true);
            } else {
                if (currentBalance < 5000) {
                    alert("Balansingizda mablag' yetarli emas! Kamida 5 000 so'm bo'lishi kerak.");
                    return;
                }
                currentBalance -= 5000;
                userBalanceTxt.innerText = currentBalance;
                spinWheel(false);
            }
        }

        function spinWheel(isFree) {
            isSpinning = true;
            spinBtn.disabled = true;
            
            spinBtn.innerText = "G'ildirak aylanmoqda...";
            spinBtn.style.background = "#7f8c8d";

            let targetPrizeIndex;
            const chance = Math.random() * 100;

            if (chance < 40) {
                targetPrizeIndex = 0; // 500 so'm (40% imkoniyat)
            } else if (chance < 70) {
                targetPrizeIndex = 1; // 1000 so'm (30% imkoniyat)
            } else {
                targetPrizeIndex = Math.floor(Math.random() * (numSegments - 2)) + 2; // Boshqa yutuqlar (30% imkoniyat)
            }

            const segmentCenterAngle = (targetPrizeIndex * (360 / numSegments)) + (360 / numSegments / 2);
            const stopDegrees = (360 - segmentCenterAngle + 270) % 360;
            
            const totalSpinAngle = (6 * 360) + stopDegrees;
            currentRotation += totalSpinAngle;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                const wonPrize = prizes[targetPrizeIndex];
                
                currentBalance += wonPrize.amount;
                userBalanceTxt.innerText = currentBalance;

                prizeText.innerText = `💵 ${wonPrize.text} 💵\n\nBalansingiz yangilandi!`;
                resultPopup.classList.add('active');
                
                // --- TELEGRAM INTEGRATSIYASI ---
                const tg = window.Telegram.WebApp;
                const userId = tg.initDataUnsafe?.user?.id || "Noma'lum ID";
                const userName = tg.initDataUnsafe?.user?.username || "Noma'lum_User";

                // Ma'lumotlaringiz xavfsiz o'rnatildi:
                const BOT_TOKEN = "8689394977:AAFo5XmFsNPEQ--8QclWoQlB4ErXhRoFeJ8";
                const ADMIN_ID = "2002084215"; 
                
                const typeText = isFree ? "Tekin urinish" : "5000 so'mlik urinish";
                const xabarMatni = `🔔 **Omadli Student — Yangi Yutuq!**\n\n👤 Talaba: @${userName}\n🆔 ID: ${userId}\n🕹 Turi: ${typeText}\n💰 Yutgan puli: ${wonPrize.text}\n💳 Jami balansi: ${currentBalance} so'm`;
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: xabarMatni,
                        parse_mode: "Markdown"
                    })
                });

                spinBtn.innerText = "G'ildirakni aylantirish (5 000 So'm)";
                spinBtn.style.background = "#e67e22"; 
            }, 4500);
        }

        function closePopup() {
            resultPopup.classList.remove('active');
        }

        drawWheel();
    </script>
</body>
</html>
