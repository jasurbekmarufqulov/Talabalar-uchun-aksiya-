<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pullik Omadli Baraban</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f0c1b;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #1d1932;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        .balance-box {
            font-size: 26px;
            font-weight: bold;
            color: #00ffaa;
            margin-bottom: 20px;
            border: 2px dashed #00ffaa;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 255, 170, 0.05);
        }

        /* 🎡 BARABAN BLOKI (RANGSIZ, FAQAT PULLAR) */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 30px auto;
        }
        /* Tepasidagi ko'rsatkich strelka */
        .arrow {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 28px solid #ffcc00;
            z-index: 10;
        }
        /* Barabanning asosi - toza to'q fon */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #ffcc00;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
            background-color: #110d26;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }

        /* PULLARNING JOYLASHUV SEKTORLARI */
        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            right: 0;
            transform-origin: 0% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Raqamlarni aylana bo'ylab burchak ostida tekislash */
        .sector span {
            position: absolute;
            transform: rotate(30deg) translate(25px, -50px);
            font-weight: bold;
            font-size: 16px;
            color: #ffffff; /* Pullar faqat oq rangda tiniq ko'rinadi */
            text-shadow: 1px 1px 2px black;
        }

        /* Burchaklar bo'yicha taqsimlash (Ranglar o'chirilgan) */
        .sec-1 { transform: rotate(0deg) skewY(-30deg); }
        .sec-2 { transform: rotate(60deg) skewY(-30deg); }
        .sec-3 { transform: rotate(120deg) skewY(-30deg); }
        .sec-4 { transform: rotate(180deg) skewY(-30deg); }
        .sec-5 { transform: rotate(240deg) skewY(-30deg); }
        .sec-6 { transform: rotate(300deg) skewY(-30deg); }

        /* Markazdagi sariq tugmacha */
        .center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #ffcc00;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* TUGMALAR STRUKTURASI */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-spin-regular { background: linear-gradient(to right, #00c6ff, #0072ff); color: white; }
        .btn-spin-premium { background: linear-gradient(to right, #f12711, #f5af19); color: white; }
        .btn-ref { background-color: #28a745; color: white; }
        .btn-withdraw { background-color: #e4a11b; color: black; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #3d356b;
            background-color: #110d26;
            color: white;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 Pullik Baraban V2</h2>
    
    <div class="balance-box">
        Hisobingiz: <span id="balans_matni">0 so'm</span>
    </div>

    <div class="wheel-wrapper">
        <div class="arrow"></div>
        <div class="center-pin">SPIN</div>
        <div class="wheel" id="baraban_gildiragi">
            <div class="sector sec-1"><span>500</span></div>
            <div class="sector sec-2"><span>1000</span></div>
            <div class="sector sec-3"><span>2000</span></div>
            <div class="sector sec-4"><span>3000</span></div>
            <div class="sector sec-5"><span>5000</span></div>
            <div class="sector sec-6"><span>10000</span></div>
        </div>
    </div>

    <button class="btn-spin-regular" onclick="barabanniAylantir('regular')">⚡️ Oddiy Aylantirish (-500 so'm)</button>
    <button class="btn-spin-premium" onclick="barabanniAylantir('premium')">👑 Premium Aylantirish (-5000 so'm)</button>
    <button class="btn-ref" onclick="do'stniTaklifQilish()">👥 Do'stni chaqirish (+500 so'm)</button>

    <div style="margin-top: 25px; border-top: 2px solid #2d264f; padding-top: 15px;">
        <h3>💳 Pulni yechib olish</h3>
        <input type="number" id="cardInput" placeholder="8600 0000 0000 0000">
        <button class="btn-withdraw" onclick="sendWithdrawRequest()">📩 Yechib olish arizasini yuborish</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 🔗 O'zingizning Render server havolangizni shu yerga yozasiz
    const SERVER_URL = "https://sizning-loyiha-nomingiz.onrender.com"; 

    let joriyBalans = 0;
    let userId = tg.initDataUnsafe?.user?.id || 7777777; 
    let username = tg.initDataUnsafe?.user?.first_name || "O'yinchi";
    let isSpinning = false; 

    // Serverdan balansni yuklash
    fetch(`${SERVER_URL}/get-user?id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if(data) {
                joriyBalans = data.balance;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        }).catch(err => console.log("Serverga ulanishda xato."));

    // AYLANTIRISHNI TEKSHIRISH
    function barabanniAylantir(rejim) {
        if(isSpinning) return; 

        if (rejim === 'regular') {
            if (joriyBalans >= 500) {
                joriyBalans -= 500;
                omadniSinash('regular');
            } else {
                alert("Hisobingizda mablag' yetarli emas! Do'stlarni taklif qilib pul ishlang.");
            }
        } 
        else if (rejim === 'premium') {
            if (joriyBalans >= 5000) {
                joriyBalans -= 5000;
                omadniSinash('premium');
            } else {
                alert("Premium rejim uchun hisobingizda kamida 5000 so'm bo'lishi kerak!");
            }
        }
        document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
    }

    // AYLANTIRISH VA YUTUQ MANTIQI (500 so'mdan 10 000 so'mgacha)
    function omadniSinash(rejim) {
        isSpinning = true;
        let gildirak = document.getElementById("baraban_gildiragi");
        
        let randomDeg = Math.floor(Math.random() * 360) + 1800; 
        gildirak.style.transform = `rotate(${randomDeg}deg)`;

        setTimeout(() => {
            let yutuq = 0;

            if (rejim === 'regular') {
                let yutuqlarXonasi = [0, 500, 1000, 2000, 3000, 5000, 10000];
                yutuq = yutuqlarXonasi[Math.floor(Math.random() * yutuqlarXonasi.length)];
                
                if(yutuq > 0) {
                    alert(`🎰 Omad! Sizga ${yutuq} so'm yutuq chiqdi!`);
                } else {
                    alert(`😢 Bu safar omad kelmadi. Yana urinib ko'ring!`);
                }
            } 
            else if (rejim === 'premium') {
                let premiumYutuqlar = [500, 2000, 5000, 5000, 10000, 10000];
                yutuq = premiumYutuqlar[Math.floor(Math.random() * premiumYutuqlar.length)];
                alert(`👑 Premium! Sizga ${yutuq} so'm chiqdi!`);
            }

            joriyBalans += yutuq; 
            document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            
            balansniServerdaYangila(joriyBalans);
            isSpinning = false;
        }, 4000); 
    }

    function balansniServerdaYangila(yangiBalans) {
        fetch(`${SERVER_URL}/update-balance`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, balance: yangiBalans })
        });
    }

    // REFERAL TIZIMI
    function do'stniTaklifQilish() {
        let botUsername = "SizningBarabanBot"; 
        let text = "Do'stim, pullik barabanni aylantirib omadingni sina, haqiqiy pul yut! 🎁";
        let link = `https://t.me/${botUsername}?start=r_${userId}`;
        
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
    }

    // PULDAN ARIZA YUBORISH
    function sendWithdrawRequest() {
        let cardNum = document.getElementById("cardInput").value;

        if (cardNum.length < 16) {
            alert("Karta raqami noto'g'ri! 16 ta raqam bo'lishi shart.");
            return;
        }
        if (joriyBalans <= 0) {
            alert("Balansda yechish uchun pul yo'q!");
            return;
        }

        fetch(`${SERVER_URL}/withdraw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, name: username, card: cardNum, summa: joriyBalans })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Arizangiz adminga jo'natildi! Pul o'tkazilgach xabar boradi.");
                joriyBalans = 0;
                document.getElementById("balans_matni").innerText = joriyBalans + " so'm";
            }
        });
    }
</script>
</body>
</html>
