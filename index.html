<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli Talaba Aksiya</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        /* Hisob qutisi */
        .balance-box {
            font-size: 20px;
            font-weight: bold;
            color: #00ffaa;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 12px;
            border: 1px dashed #00ffaa;
            display: inline-block;
            min-width: 180px;
        }

        /* Ruletka g'ildiragi va pullarni joylashtirish */
        .wheel-outer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 25px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ffd700;
            background: #222;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            overflow: hidden;
        }

        /* Har bir pul miqdori uchun sektor stili */
        .number-sector {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #ffd700;
            transform-origin: 50% 50%;
            padding-top: 20px;
            box-sizing: border-box;
        }

        /* Chiziqlar orqali barabanni bo'lish */
        .line {
            position: absolute;
            width: 2px;
            height: 50%;
            background: rgba(255, 215, 0, 0.35);
            left: 50%;
            top: 0;
            transform-origin: 50% 100%;
        }

        /* Ruletka ko'rsatkichi (Arrow) */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Tugmalar stili */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-sizing: border-box;
        }
        button:active { transform: scale(0.97); }

        .spin-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #1e3c72;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .premium-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .ref-btn {
            background: linear-gradient(45deg, #2ed573, #26af5f);
            color: white;
            box-shadow: 0 4px 12px rgba(46, 213, 115, 0.3);
        }

        .withdraw-btn {
            background: linear-gradient(45deg, #e4a11b, #ffcc00);
            color: black;
        }

        button:disabled {
            background: #cccccc !important;
            color: #666666 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        /* Karta kiritish bo'limi */
        .card-box {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
            text-align: center;
        }

        .card-box h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            letter-spacing: 1px;
        }

        /* Natija ekrani */
        .result-box {
            display: none;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            animation: fadeIn 0.5s ease;
        }

        .prize-text {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Omadli Talaba</h1>
        <div class="subtitle">Rasmiy homiylik aksiyasi</div>

        <!-- Balans ko'rsatkichi -->
        <div class="balance-box">
            Balans: <span id="balans_matni">0 so'm</span>
        </div>

        <div class="wheel-outer">
            <div class="arrow"></div>
            <div id="wheel" class="wheel">
                <!-- Baraban chiziqlari -->
                <div class="line" style="transform: rotate(0deg);"></div>
                <div class="line" style="transform: rotate(45deg);"></div>
                <div class="line" style="transform: rotate(90deg);"></div>
                <div class="line" style="transform: rotate(135deg);"></div>
                <div class="line" style="transform: rotate(180deg);"></div>
                <div class="line" style="transform: rotate(225deg);"></div>
                <div class="line" style="transform: rotate(270deg);"></div>
                <div class="line" style="transform: rotate(315deg);"></div>

                <!-- Sektorlardagi pul miqdorlari (Siz bergan tartibda) -->
                <div class="number-sector" style="transform: rotate(22.5deg);">1,000 so'm</div>
                <div class="number-sector" style="transform: rotate(67.5deg);">3,000 so'm</div>
                <div class="number-sector" style="transform: rotate(112.5deg);">5,000 so'm</div>
                <div class="number-sector" style="transform: rotate(157.5deg);">2,000 so'm</div>
                <div class="number-sector" style="transform: rotate(202.5deg);">10,000 so'm</div>
                <div class="number-sector" style="transform: rotate(247.5deg);">4,000 so'm</div>
                <div class="number-sector" style="transform: rotate(292.5deg);">6,000 so'm</div>
                <div class="number-sector" style="transform: rotate(337.5deg);">8,000 so'm</div>
            </div>
        </div>

        <!-- Tugmalar -->
        <button id="spinBtn" class="spin-btn" onclick="startSpin('regular')">⚡️ Oddiy Aylantirish (-500 so'm)</button>
        <button id="premiumBtn" class="premium-btn" onclick="startSpin('premium')">👑 Premium Aylantirish (-5000 so'm)</button>
        <button class="ref-btn" onclick="do'stniTaklifQilish()">👥 Do'stni chaqirish (+500 so'm)</button>

        <!-- Natija xabari -->
        <div id="resultBox" class="result-box">
            <div id="prizeText" class="prize-text"></div>
        </div>

        <!-- Karta raqami va Pul yechish -->
        <div class="card-box">
            <h3>💳 Karta raqami orqali yechish</h3>
            <input type="number" id="cardInput" placeholder="8600 0000 0000 0000">
            <button class="withdraw-btn" onclick="sendResultToBot()">📩 Yechib olish arizasini yuborish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let joriyBalans = 0; // Boshlang'ich balans
        let isSpinning = false;
        let selectedPrize = "";

        // Sektor tartibi bo'yicha yutuqlar massivi
        const prizes = ["1,000", "3,000", "5,000", "2,000", "10,000", "4,000", "6,000", "8,000"];

        // Birinchi marta ekranga balansni chiqarish
        document.getElementById('balans_matni').innerText = joriyBalans.toLocaleString('uz-UZ') + " so'm";

        function startSpin(rejim) {
            if (isSpinning) return;

            // Pul yetishini tekshirish
            if (rejim === 'regular') {
                if (joriyBalans < 500) {
                    alert("Hisobingizda mablag' yetarli emas (Kamida 500 so'm kerak)!");
                    return;
                }
                joriyBalans -= 500;
            } else if (rejim === 'premium') {
                if (joriyBalans < 5000) {
                    alert("Premium rejim uchun balansda kamida 5000 so'm bo'lishi kerak!");
                    return;
                }
                joriyBalans -= 5000;
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('premiumBtn').disabled = true;
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('balans_matni').innerText = joriyBalans.toLocaleString('uz-UZ') + " so'm";

            const wheel = document.getElementById('wheel');
            
            // Tasodifiy aylanish burchagi algoritmiz
            const randomDegree = Math.floor(Math.random() * 360) + 2160; // 6 marta to'liq aylanish effekti
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            // To'xtagan joyni hisoblash
            const actualDegrees = randomDegree % 360;
            const sectorIndex = Math.floor((360 - actualDegrees) / 45) % 8;
            
            selectedPrize = prizes[sectorIndex];
            let yutuqSummasi = parseInt(selectedPrize.replace(/,/g, ''));

            // Agar Premium rejim bo'lsa yutuqni 2 baravar oshirish (yoki o'zingiz hohlagan bonusni qo'shish)
            if (rejim === 'premium') {
                yutuqSummasi = yutuqSummasi * 2; 
                selectedPrize = yutuqSummasi.toLocaleString('uz-UZ');
            }

            setTimeout(() => {
                // Balansni yangilash
                joriyBalans += yutuqSummasi;
                document.getElementById('balans_matni').innerText = joriyBalans.toLocaleString('uz-UZ') + " so'm";
                
                document.getElementById('prizeText').innerText = `🎉 Tabriklaymiz! Sizga ${selectedPrize} so'm yutuq qo'shildi!`;
                document.getElementById('resultBox').style.display = 'block';
                
                // Tugmalarni faollashtirish
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                document.getElementById('premiumBtn').disabled = false;
            }, 4000);
        }

        // 👥 REFERAL TIZIMI: Botga do'stni taklif qilish havolasi
        function do'stniTaklifQilish() {
            let botUsername = "SizningAksiyaBot"; // Bu yerga botingiz usernamesini yozing
            let userId = tg.initDataUnsafe?.user?.id || "777777";
            let text = "Do'stim, Omadli Talaba aksiyasida qatnashib, naqd pul yutuqlariga ega bo'l! 🎁";
            let link = `https://t.me/${botUsername}?start=r_${userId}`;
            
            // Do'stni chaqirganda foydalanuvchiga rag'bat sifatida +500 so'm berish
            joriyBalans += 500;
            document.getElementById('balans_matni').innerText = joriyBalans.toLocaleString('uz-UZ') + " so'm";
            
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
        }

        // 📩 YETCHIB OLISH ARIZASINI BOTGA YUBORISH
        function sendResultToBot() {
            const cardNum = document.getElementById("cardInput").value;

            if (cardNum.length < 16) {
                alert("Karta raqami noto'g'ri! 16 ta raqam bo'lishi shart.");
                return;
            }
            if (joriyBalans <= 0) {
                alert("Balansda yechib olish uchun pul yo'q!");
                return;
            }

            // Ma'lumotlarni string shaklida botga jo'natish
            const dataString = `Yechish|Karta: ${cardNum}|Summa: ${joriyBalans.toLocaleString('uz-UZ')} so'm`;
            tg.sendData(dataString);
            
            // Yuborilgandan so'ng balansni nollash
            joriyBalans = 0;
            document.getElementById('balans_matni').innerText = "0 so'm";
            alert("Arizangiz adminga muvaffaqiyatli yuborildi!");
            tg.close();
        }
    </script>
</body>
</html>
